<html>
<head>
  <meta charset="utf-8" />
  <script>
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      '/speaktoahuman/' +
      '?p=' + encodeURIComponent(l.pathname.slice('/speaktoahuman/'.length) + l.search) +
      (l.hash || '')
    );
  </script>
</head>
